name: boxlite ssh
synopsis: SSH into a box
description: Establish an SSH connection to a running box
usage: boxlite ssh [BOX_ID] | [BOX_NAME] [flags]
options:
  - name: expires
    default_value: '1440'
    usage: |
      SSH access token expiration time in minutes (defaults to 24 hours)
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for boxlite
see_also:
  - boxlite - BoxLite CLI
