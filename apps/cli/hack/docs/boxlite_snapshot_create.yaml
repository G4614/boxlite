name: boxlite snapshot create
synopsis: Create a snapshot
usage: boxlite snapshot create [SNAPSHOT] [flags]
options:
  - name: context
    shorthand: c
    default_value: '[]'
    usage: |
      Files or directories to include in the build context (can be specified multiple times). If not provided, context will be automatically determined from COPY/ADD commands in the Dockerfile
  - name: cpu
    default_value: '0'
    usage: |
      CPU cores that will be allocated to the underlying boxes (default: 1)
  - name: disk
    default_value: '0'
    usage: |
      Disk space that will be allocated to the underlying boxes in GB (default: 3)
  - name: dockerfile
    shorthand: f
    usage: Path to Dockerfile to build
  - name: entrypoint
    shorthand: e
    usage: The entrypoint command for the snapshot
  - name: image
    shorthand: i
    usage: The image name for the snapshot
  - name: memory
    default_value: '0'
    usage: |
      Memory that will be allocated to the underlying boxes in GB (default: 1)
  - name: region
    usage: |
      ID of the region where the snapshot will be available (defaults to organization default region)
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for boxlite
see_also:
  - boxlite snapshot - Manage BoxLite snapshots
