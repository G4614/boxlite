name: boxlite stop
synopsis: Stop a box
usage: boxlite stop [BOX_ID] | [BOX_NAME] [flags]
options:
  - name: force
    shorthand: f
    default_value: 'false'
    usage: Force stop the box using SIGKILL
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for boxlite
see_also:
  - boxlite - BoxLite CLI
