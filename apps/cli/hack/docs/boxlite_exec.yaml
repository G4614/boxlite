name: boxlite exec
synopsis: Execute a command in a box
description: Execute a command in a running box
usage: boxlite exec [BOX_ID | BOX_NAME] -- [COMMAND] [ARGS...] [flags]
options:
  - name: cwd
    usage: Working directory for command execution
  - name: timeout
    default_value: '0'
    usage: Command timeout in seconds (0 for no timeout)
inherited_options:
  - name: help
    default_value: 'false'
    usage: help for boxlite
see_also:
  - boxlite - BoxLite CLI
