# Dex OIDC Provider Configuration for BoxLite
# Issuer URL is set via DEX_ISSUER environment variable at runtime

issuer: ${DEX_ISSUER}
storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556
  # CORS origins allowed to call Dex endpoints. Rendered from DEX_ALLOWED_ORIGINS
  # (entrypoint.sh / local-dex-env.mjs). Never ship '*' — that lets any site call
  # the identity provider's auth/token endpoints. Default is the local dev origins.
  allowedOrigins: ${DEX_ALLOWED_ORIGINS}
  allowedHeaders: ['x-requested-with']

staticClients:
  - id: boxlite
    redirectURIs:
      - '${REDIRECT_URI}'
      - 'http://localhost:3000'
      - 'http://localhost:5173'
      # CLI Authorization-Code callback. RFC 8252 §8.3 requires the
      # loopback IP literal (127.0.0.1), not `localhost`: the IP literal
      # can't be hijacked via /etc/hosts and never binds to a non-loopback
      # interface. The Rust CLI (src/cli/src/commands/auth/oidc/auth_code.rs)
      # always builds the redirect_uri with 127.0.0.1, so no `localhost`
      # alias is registered.
      - 'http://127.0.0.1:5555/callback'
    name: 'BoxLite'
    public: true

# Enable OAuth 2.0 Device Authorization Grant (RFC 8628) so headless / SSH
# `boxlite auth login --no-browser` can complete. Empty object accepts Dex's
# built-in defaults; no per-client config is needed for our `public: true`
# `boxlite` client.
oauth2:
  deviceFlow: {}

# enablePasswordDB / staticPasswords are intentionally NOT hard-coded here.
# Shipping the static `admin@boxlite.dev` / `password` account in the committed
# config means any deployment using this file as-is has a known admin login.
# The static dev account is now injected only when explicitly enabled:
#   - entrypoint.sh (container/prod): appends it ONLY if DEX_ENABLE_STATIC_PASSWORD=true,
#     otherwise renders `enablePasswordDB: false` (secure default).
#   - local-dex-env.mjs (local dev / e2e): always injects it, so the documented
#     `admin@boxlite.dev` / `password` dev login keeps working.
