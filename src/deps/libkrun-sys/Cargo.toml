[package]
name = "libkrun-sys"
version.workspace = true
edition = "2021"
authors.workspace = true
license.workspace = true
description = "FFI bindings to libkrun and libkrunfw"
repository = "https://github.com/boxlite-ai/boxlite"

links = "krun"
exclude = ["vendor"]

[build-dependencies]
pkg-config = "0.3"
num_cpus = "1.16"

[dependencies]
libc = "0.2"

[features]
default = ["kernel-lean"]
krun = []          # Build init binary + libkrun.a + emit link directives
krunfw = []        # Download/build libkrunfw.dylib/.so
kernel-lean = []   # Embed lean kernel (minimal, default)
kernel-net = []    # Embed net kernel (netfilter/nf_tables/bridge)
