# cbindgen configuration for boxlite-c
# See: https://github.com/mozilla/cbindgen/blob/master/docs.md

language = "C"
include_guard = "BOXLITE_H"
pragma_once = true
cpp_compat = true
documentation = true
documentation_style = "c99"

# Style settings
style = "both"
usize_is_size_t = true

[parse]
parse_deps = false

[export]
exclude = [
    "boxlite_execution_set_stream_paused",
]
