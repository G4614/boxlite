# End-to-end suite — SDK → API → Runner → libkrun VM.
#
# Existing `make test:integration:*` uses the local PyO3 / FFI path
# (`Boxlite.default()`) and bypasses both the NestJS API and boxlite-runner,
# so bugs that surface only on the REST → API → runner chain (e.g. #563's
# exec-stdout drop, #627's attach re-drain) reach production without
# breaking CI. This workflow runs the full path.
#
# Required-check shape: the `e2e-gate` job ALWAYS runs and reports
# success/failure. Branch protection on `main` should require the
# `E2E gate (required)` check — the cheap `changes` job on a
# GitHub-hosted runner decides if the expensive `e2e` job needs to
# fire at all (kvm self-hosted runner contention), and the gate
# collapses the result into one always-reported check.
#
# Requires nested-KVM. Targets a self-hosted runner labeled `kvm` (a
# common pattern is a long-lived EC2 m5.metal or *.metal-* with the
# stack pre-bootstrapped). On a fresh runner the first run will
# bootstrap; subsequent runs skip bootstrap and just run pytest.

name: E2E stack

# No path filter on triggers: must always start so branch protection
# can require this workflow's gate as a status check. Path matching
# happens inside the `changes` job and gates the expensive `e2e` job.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      pr_ref:
        description: 'Branch to compare against main (two-sided run)'
        required: false

concurrency:
  group: e2e-stack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap detector on GitHub-hosted runner: decide if the expensive
  # e2e job needs to fire. Avoids burning self-hosted KVM-runner time
  # on PRs that don't touch any code path the suite exercises.
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'sdks/c/src/exec/**'
              - 'sdks/python/src/**'
              - 'src/boxlite/src/rest/**'
              - 'src/boxlite/src/cli/**'
              - 'apps/runner/**'
              - 'apps/api/src/**'
              - 'scripts/test/e2e/**'
              - '.github/workflows/e2e-stack.yml'

  e2e:
    name: E2E suite (kvm)
    needs: changes
    # Skip on PRs that don't touch relevant paths. workflow_dispatch
    # always runs (operator explicitly asked for it).
    if: needs.changes.outputs.relevant == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Bootstrap is idempotent — skips if services are already up.
      - name: Bootstrap stack (services + fixture data)
        run: make test:e2e:setup

      # Rebuild Python SDK from this checkout so the test exercises the
      # code under review, not whatever wheel happened to be installed.
      - name: Rebuild Python SDK wheel from this checkout
        run: |
          cd sdks/python
          pip install --break-system-packages --quiet maturin
          maturin build --release --quiet
          pip install --break-system-packages --force-reinstall \
            ../../target/wheels/boxlite-*.whl

      # `make test:e2e:setup` (above) already builds boxlite-runner from the
      # working tree — release pinning would test stale code. Restart the
      # service in case bootstrap was a no-op (binary unchanged, e.g. PR
      # didn't touch runner code) so any other prereq drift is picked up.
      - name: Restart runner to pick up freshly-installed binary
        run: |
          sudo systemctl restart boxlite-runner
          for _ in $(seq 1 30); do
            ss -ltn | grep -q ':8080' && break
            sleep 1
          done

      - name: Run E2E suite
        run: make test:e2e

      - name: Collect logs on failure
        if: failure()
        run: |
          tail -200 /var/log/boxlite-api.log
          sudo journalctl -u boxlite-runner --no-pager -n 200

  # Single always-runs job that branch protection can require.
  # Collapses the conditional `e2e` outcome into one stable check
  # name. Pass = e2e ran and passed, OR no relevant paths changed.
  # Fail = e2e ran and failed / was cancelled.
  e2e-gate:
    name: E2E gate (required)
    needs: [changes, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Decide gate result
        run: |
          set -e
          IS_DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"
          RELEVANT="${{ needs.changes.outputs.relevant }}"
          E2E_RESULT="${{ needs.e2e.result }}"

          if [[ "$RELEVANT" != "true" && "$IS_DISPATCH" != "true" ]]; then
            echo "✅ E2E gate: skipped — no relevant paths changed in this PR"
            exit 0
          fi

          case "$E2E_RESULT" in
            success)
              echo "✅ E2E gate: e2e suite passed"
              exit 0
              ;;
            *)
              echo "❌ E2E gate: e2e suite reported '$E2E_RESULT'"
              exit 1
              ;;
          esac
