# Build + deploy the boxlite-runner binary to the Tokyo EC2 host (PR #724).
#
# Self-contained: chains build-c.yml (libboxlite.a from THIS checkout's
# Rust source) → build-runner-binary.yml (Go binary linking the .a) →
# a deploy job that pushes to S3 and waits for the EC2-side systemd
# timer to hot-swap the binary.
#
# Triggers:
# - workflow_call:     reused from .github/workflows/e2e-cloud.yml so the
#                      e2e job depends on a fresh runner being live
#                      before pytest.
# - workflow_dispatch: standalone trigger for verifying the deploy
#                      pipeline (build + deploy) without going through
#                      the API rebuild + pytest chain.
#
# The Tokyo runner's S3 poller (one-time install via PowerUserAccess
# SSM) is the consumer end — see docs/runbook/runner-self-update.md
# (TODO) or the installer at /usr/local/bin/boxlite-runner-poll.sh on
# i-0198ebab64f67b9ff.
#
# All AWS interactions in the `deploy` job use the existing e2e-cloud
# OIDC role's permissions (`s3:PutObject`/`GetObject`/`HeadObject` on
# `${stack_prefix}-storagebucket-*/builds/*` + read-only resource
# resolution). No IAM mutation needed.
name: Deploy Runner Binary

on:
  workflow_call: {}
  workflow_dispatch:
    inputs:
      runner_artifact_run_id:
        description: 'Optional: GHA run ID to pull the runner-linux-amd64 artifact from (e.g. a previous deploy-runner or e2e-cloud run). When set, skips build_c_sdk + build_runner and goes straight to deploy — useful for verifying the deploy path against a known-good binary.'
        type: string
        required: false
        default: ''
  # `push:` trigger so we can verify the deploy pipeline standalone
  # WHILE this workflow file is still on a feature branch
  # (workflow_dispatch only works for workflow files that already
  # exist on the default branch; this PR isn't merged yet).
  #
  # Trigger-level paths filter is broad (intentionally includes the
  # workflow files themselves, so commits to this file fire CI for
  # verification). The internal `changes` job below narrows to actual
  # source changes — workflow-only commits fire the workflow but the
  # build + deploy jobs skip.
  push:
    paths:
      - 'apps/runner/**'
      - 'apps/daemon/**'
      - 'apps/common-go/**'
      - 'apps/api-client-go/**'
      - 'apps/libs/computer-use/**'
      - 'sdks/go/**'
      - 'src/boxlite/**'
      - 'src/api-client/**'
      - 'src/shared/**'
      - 'src/deps/**'
      - 'scripts/build/**'
      - 'sdks/c/src/exec/**'
      - '.github/workflows/deploy-runner.yml'
      - '.github/workflows/build-c.yml'
      - '.github/workflows/build-runner-binary.yml'

permissions:
  contents: read

jobs:
  # ── Detect real source changes so workflow-only commits don't build ──
  # On push: dorny/paths-filter diffs HEAD against the prior commit. On
  # workflow_call / workflow_dispatch, the comparison is meaningless
  # (no diff or HEAD-vs-HEAD), so we force `should_build=true` for
  # those events — caller (e2e-cloud) is responsible for its own
  # changes detection before calling, and workflow_dispatch is an
  # explicit "I want a fresh build + deploy" signal.
  changes:
    name: Detect runner source changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      prev_run_id: ${{ steps.decide.outputs.prev_run_id }}
    steps:
      - uses: actions/checkout@v5
      - id: filter
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          # `base: github.event.before` makes the diff "what this push
          # introduced" (HEAD vs parent). Default `base` is the default
          # branch's HEAD, which means a feature branch with N prior
          # commits would see ALL its commits in the diff every push.
          base: ${{ github.event.before }}
          filters: |
            runner_source:
              - 'apps/runner/**'
              - 'apps/daemon/**'
              - 'apps/common-go/**'
              - 'apps/api-client-go/**'
              - 'apps/libs/computer-use/**'
              - 'sdks/go/**'
              - 'src/boxlite/**'
              - 'src/api-client/**'
              - 'src/shared/**'
              - 'src/deps/**'
              - 'scripts/build/**'
              - 'sdks/c/src/exec/**'
      - id: decide
        env:
          PUSH_CHANGED: ${{ steps.filter.outputs.runner_source }}
          PREV_RUN_ID: ${{ inputs.runner_artifact_run_id }}
        run: |
          # Resolve prev-run-id, in order of precedence:
          #  1. workflow_dispatch input `runner_artifact_run_id`
          #  2. commit-message tag `[runner-from: <run_id>]` (push-event
          #     workaround: workflow_dispatch only works after the
          #     workflow file lands on the default branch, so we offer
          #     a commit-message override for testing pre-merge)
          PREV=""
          if [ -n "${PREV_RUN_ID:-}" ]; then
              PREV="$PREV_RUN_ID"
              echo "Using workflow_dispatch input runner_artifact_run_id=$PREV"
          else
              COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || true)
              if [[ "$COMMIT_MSG" =~ \[runner-from:\ ([0-9]+)\] ]]; then
                  PREV="${BASH_REMATCH[1]}"
                  echo "Using commit-message tag [runner-from: $PREV]"
              fi
          fi

          if [ -n "$PREV" ]; then
              echo "Reusing artifact from run $PREV — SKIP build, RUN deploy."
              echo "should_build=false"   >> "$GITHUB_OUTPUT"
              echo "should_deploy=true"   >> "$GITHUB_OUTPUT"
              echo "prev_run_id=$PREV"    >> "$GITHUB_OUTPUT"
              exit 0
          fi

          if [ "${{ github.event_name }}" != 'push' ]; then
              echo "Non-push event (${{ github.event_name }}) — force build + deploy."
              echo "should_build=true"   >> "$GITHUB_OUTPUT"
              echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
          elif [ "${PUSH_CHANGED:-false}" = 'true' ]; then
              echo "Push touched runner_source paths — build + deploy."
              echo "should_build=true"   >> "$GITHUB_OUTPUT"
              echo "should_deploy=true"  >> "$GITHUB_OUTPUT"
          else
              echo "Push only touched workflow files — SKIP build + deploy."
              echo "should_build=false"  >> "$GITHUB_OUTPUT"
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build libboxlite.a from THIS checkout's Rust source ────────────
  # target_filter constrains the matrix to linux-x64-gnu (Tokyo runner
  # is amd64; skip macOS / linux-arm64 entries from the platforms list).
  build_c_sdk:
    name: Build C SDK (linux-x64-gnu)
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build-c.yml
    with:
      target_filter: linux-x64-gnu
    permissions:
      # Inherit defaults — build-c.yml's `upload-to-release` job declares
      # contents: write; even though that job's `if:` skips for
      # workflow_call, the caller still needs to grant at-least-as-much.
      contents: write

  # ── Build the Go runner binary linking the fresh libboxlite.a ──────
  build_runner:
    name: Build runner binary
    needs: [changes, build_c_sdk]
    if: needs.changes.outputs.should_build == 'true'
    uses: ./.github/workflows/build-runner-binary.yml
    with:
      libboxlite_source: build
    permissions:
      contents: write

  # ── Deploy: S3 upload + pre-signed URL + SSM Run Command ──────────
  #
  # Pattern follows `scripts/deploy/runner-update-binary.sh` (main): use
  # SSM Run Command to drive an in-place binary swap on the Tokyo EC2.
  # Difference vs main's script: that one curls a tagged GitHub release;
  # we curl an S3 pre-signed URL (PR builds aren't published as releases).
  #
  # Pre-signed URL has the AWS Sigv4 query auth baked in, so the EC2 host
  # does NOT need IAM perms to read the bucket — curl-only. The OIDC role
  # only needs s3:PutObject on the storagebucket (already in its policy).
  #
  # Bucket name: SST `sst.aws.Bucket('Storage')` generates a stable name
  # with a random Pulumi-state suffix. Hardcoded here because:
  #   - `s3api list-buckets` requires s3:ListAllMyBuckets, which has
  #     been observed returning empty for this role in some sessions
  #     (probably account-level SCP) — better to bypass.
  #   - The suffix is stable across SST deploys (Pulumi state keeps it).
  #     If the stack is destroyed and recreated, update this value.
  deploy:
    name: Deploy runner to Tokyo EC2 (SSM Run Command)
    needs: [changes, build_runner]
    if: |
      !failure() && !cancelled()
      && needs.changes.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_E2E_CLOUD_REGION }}
      AWS_ROLE_ARN: ${{ vars.AWS_E2E_CLOUD_ROLE_ARN }}
      SSM_DOC_NAME: boxlite-runner-deploy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: deploy-runner-${{ github.run_id }}

      - name: Resolve Tokyo runner instance + storage bucket
        id: ec2
        run: |
          set -euo pipefail
          ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=boxlite-runner" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' --output text)
          [ -n "$ID" ] && [ "$ID" != "None" ] || { echo "::error::No running boxlite-runner instance"; exit 1; }
          echo "runner_id=$ID" >> "$GITHUB_OUTPUT"
          echo "::notice::Runner instance: $ID"

          echo '--- ALL buckets visible to this role ---'
          aws s3api list-buckets --query 'Buckets[].Name' --output text || true
          echo
          echo '--- buckets containing "boxlite-e2e-ci" ---'
          BUCKETS=$(aws s3api list-buckets --query "Buckets[?contains(Name,'boxlite-e2e-ci')].Name" --output text || true)
          echo "matched: $BUCKETS"
          COUNT=$(printf '%s\n' "$BUCKETS" | wc -w | tr -d ' ')
          if [ "$COUNT" -ge 1 ]; then
              # Pick the storagebucket among the matches
              STORE=$(printf '%s\n' $BUCKETS | grep storagebucket | head -1 || true)
              if [ -n "$STORE" ]; then
                  echo "Resolved storagebucket: $STORE"
                  echo "s3_bucket=$STORE" >> "$GITHUB_OUTPUT"
              else
                  echo "::error::No storagebucket among matched: $BUCKETS"
                  exit 1
              fi
          else
              echo "::error::No buckets matched 'boxlite-e2e-ci' — stack may not exist"
              exit 1
          fi

      - name: Download runner binary artifact (this run)
        if: needs.changes.outputs.prev_run_id == ''
        uses: actions/download-artifact@v4
        with:
          name: runner-linux-amd64
          path: /tmp/runner-artifact/

      - name: Download runner binary artifact (from prior run)
        if: needs.changes.outputs.prev_run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: runner-linux-amd64
          path: /tmp/runner-artifact/
          run-id: ${{ needs.changes.outputs.prev_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Upload to S3 + SSM Run Command swap binary
        env:
          S3_BUCKET: ${{ steps.ec2.outputs.s3_bucket }}
        run: |
          set -euo pipefail
          RUNNER_ID="${{ steps.ec2.outputs.runner_id }}"
          ARCHIVE=$(ls /tmp/runner-artifact/boxlite-runner-*-linux-amd64.tar.gz | head -1)
          [ -n "$ARCHIVE" ] || { echo "::error::No runner artifact found"; exit 1; }

          KEY="builds/runner-deploy/binary-${GITHUB_SHA}.tar.gz"
          aws s3 cp "$ARCHIVE" "s3://${S3_BUCKET}/${KEY}"
          echo "::notice::Uploaded to s3://${S3_BUCKET}/${KEY}"

          # 15-min pre-signed URL — enough for SSM dispatch + curl on
          # EC2; short enough to be tolerable if it leaks via logs.
          URL=$(aws s3 presign "s3://${S3_BUCKET}/${KEY}" --expires-in 900)

          # JSON-encode the commands array via python (URL has `&` and
          # `=` which would otherwise break aws CLI's --parameters
          # `key=value` shorthand). Custom doc `boxlite-runner-deploy`
          # is a 1:1 clone of AWS-RunShellScript, tagged
          # Name=boxlite-runner so the OIDC role's tag-conditioned
          # ssm:SendCommand statement allows dispatch to it.
          python3 - "$URL" >/tmp/params.json <<'PY'
          import json, sys
          url = sys.argv[1]
          cmds = [
              "set -euxo pipefail",
              f"curl -fsSL --max-time 60 -o /tmp/boxlite-runner.tar.gz '{url}'",
              "systemctl stop boxlite-runner",
              "tar xzf /tmp/boxlite-runner.tar.gz -C /usr/local/bin/",
              "chmod +x /usr/local/bin/boxlite-runner",
              "systemctl start boxlite-runner",
              "sleep 5",
              "systemctl is-active --quiet boxlite-runner || { journalctl -u boxlite-runner -n 50 --no-pager; exit 1; }",
              "/usr/local/bin/boxlite-runner --version 2>&1 || true",
          ]
          json.dump({"commands": cmds}, sys.stdout)
          PY

          CMD_ID=$(aws ssm send-command \
              --instance-ids "$RUNNER_ID" \
              --document-name "$SSM_DOC_NAME" \
              --comment "deploy-runner ${GITHUB_SHA}" \
              --parameters file:///tmp/params.json \
              --query 'Command.CommandId' --output text)
          echo "::notice::SSM Command ID: $CMD_ID"

          # Wait up to ~3 min (cold-start tar extract + systemd start).
          for i in $(seq 1 36); do
              sleep 5
              STATUS=$(aws ssm get-command-invocation \
                  --command-id "$CMD_ID" --instance-id "$RUNNER_ID" \
                  --query Status --output text 2>/dev/null || echo "Pending")
              echo "  [$i/36] $STATUS"
              case "$STATUS" in
                  Success)
                      echo "::notice::Runner deploy succeeded"
                      aws ssm get-command-invocation \
                          --command-id "$CMD_ID" --instance-id "$RUNNER_ID" \
                          --query 'StandardOutputContent' --output text | tail -10
                      exit 0 ;;
                  Failed|TimedOut|Cancelled)
                      echo "::error::SSM deploy ended with status=$STATUS"
                      aws ssm get-command-invocation \
                          --command-id "$CMD_ID" --instance-id "$RUNNER_ID" \
                          --query '{out:StandardOutputContent,err:StandardErrorContent}' \
                          --output json || true
                      exit 1 ;;
              esac
          done
          echo "::error::SSM deploy did not complete within 180s"
          exit 1
