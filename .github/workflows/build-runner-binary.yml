# Build the runner Go binary for Linux amd64.
#
# Self-contained workflow that downloads the prebuilt libboxlite.a from
# GitHub Releases, builds daemon + computer-use + runner with plain `go build`,
# and uploads the runner binary to GitHub Releases.
#
# The runner binary is fully self-contained: it links libboxlite.a (which
# auto-extracts the embedded runtime at startup) and embeds the daemon and
# computer-use binaries as static assets.
#
# Triggers:
# - workflow_run: After "Build C SDK" completes (ensures libboxlite.a exists)
# - workflow_dispatch: Manual trigger for testing
name: Build Runner Binary

on:
  workflow_run:
    workflows: ["Build C SDK"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  actions: read  # download artifacts from the triggering "Build C SDK" run

env:
  CARGO_TERM_COLOR: always

jobs:
  config:
    uses: ./.github/workflows/config.yml

  build:
    name: Build Runner (linux-amd64)
    needs: config
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read  # download artifacts from the triggering "Build C SDK" run

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.config.outputs.go-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Source `libboxlite.a` from the freshly-built "Build C SDK" artifact
      # rather than the v${VERSION} release tarball. The release artifact
      # lags `main` whenever the Go side adds a new C symbol before a new
      # release is cut (e.g. `boxlite_rest_options_set_path_prefix` on main
      # not in v0.9.5), which breaks the cgo link. Consuming the workflow
      # artifact keeps Go and C in lockstep on the same commit.
      - name: Resolve fresh Build C SDK run id
        id: csdk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          # workflow_run trigger: the triggering Build C SDK run id (empty otherwise)
          EVENT_C_RUN_ID: ${{ github.event.workflow_run.id }}
          # workflow_dispatch: branch this workflow is dispatched on
          DISPATCH_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ] && [ -n "$EVENT_C_RUN_ID" ]; then
            RUN_ID="$EVENT_C_RUN_ID"
            echo "Using triggering workflow_run id=$RUN_ID"
          else
            RUN_ID=$(gh run list --repo "$REPO" --workflow "Build C SDK" \
                       --branch "$DISPATCH_REF" --status success \
                       --limit 1 --json databaseId --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "::error::No successful Build C SDK run found on branch=$DISPATCH_REF — run Build C SDK first." >&2
              exit 1
            fi
            echo "Resolved latest successful Build C SDK run id=$RUN_ID on $DISPATCH_REF"
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download libboxlite.a from Build C SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: c-sdk-linux-x64-gnu
          path: /tmp/csdk
          run-id: ${{ steps.csdk.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Install libboxlite.a into sdks/go
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # The c-sdk artifact contains exactly one tarball:
          #   boxlite-c-v${VERSION}-linux-x64-gnu.tar.gz
          # which expands to boxlite-c-v${VERSION}-linux-x64-gnu/lib/libboxlite.a
          ARCHIVE="boxlite-c-v${VERSION}-linux-x64-gnu.tar.gz"
          tar xzf "/tmp/csdk/${ARCHIVE}" -C /tmp/
          cp "/tmp/boxlite-c-v${VERSION}-linux-x64-gnu/lib/libboxlite.a" sdks/go/libboxlite.a
          ls -l sdks/go/libboxlite.a

      - name: Rewrite go.work for minimal modules
        run: |
          printf 'go 1.25.4\n\nuse (\n\t./runner\n\t./daemon\n\t./common-go\n\t./api-client-go\n\t./libs/computer-use\n\t../sdks/go\n)\n' > apps/go.work

      - name: Download Go dependencies
        run: |
          go -C apps/runner mod download
          go -C apps/daemon mod download
          go -C apps/common-go mod download
          go -C apps/api-client-go mod download
          go -C apps/libs/computer-use mod download

      - name: Build daemon
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -C apps \
            -ldflags "-X 'github.com/boxlite-ai/daemon/internal.Version=${VERSION}'" \
            -o runner/pkg/daemon/static/daemon-amd64 \
            ./daemon/cmd/daemon/

      - name: Build computer-use
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -C apps \
            -o runner/pkg/daemon/static/boxlite-computer-use \
            ./libs/computer-use/

      - name: Build runner
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -C apps \
            -ldflags "-X 'github.com/boxlite-ai/runner/internal.Version=${VERSION}'" \
            -o /tmp/boxlite-runner \
            ./runner/cmd/runner/

      - name: Package runner binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tar czf "boxlite-runner-v${VERSION}-linux-amd64.tar.gz" -C /tmp boxlite-runner
          # Integrity manifest the runner's user-data verifies before installing
          # the binary (apps/infra/sst.config.ts buildRunnerUserData).
          sha256sum "boxlite-runner-v${VERSION}-linux-amd64.tar.gz" > "boxlite-runner-v${VERSION}-linux-amd64.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-linux-amd64
          path: |
            boxlite-runner-v*-linux-amd64.tar.gz
            boxlite-runner-v*-linux-amd64.tar.gz.sha256
          if-no-files-found: error
          retention-days: ${{ needs.config.outputs.artifact-retention-days }}

  upload-to-release:
    name: Upload to GitHub Release
    needs: [config, build]
    if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: runner-*
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/boxlite-runner-v*.tar.gz
            dist/boxlite-runner-v*.tar.gz.sha256
          fail_on_unmatched_files: true
