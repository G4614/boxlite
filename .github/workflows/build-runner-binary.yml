# Build the runner Go binary for Linux amd64.
#
# Self-contained workflow that downloads the prebuilt libboxlite.a from
# GitHub Releases, builds daemon + computer-use + runner with plain `go build`,
# and uploads the runner binary to GitHub Releases.
#
# The runner binary is fully self-contained: it links libboxlite.a (which
# auto-extracts the embedded runtime at startup) and embeds the daemon and
# computer-use binaries as static assets.
#
# Triggers:
# - workflow_run: After "Build C SDK" completes (ensures libboxlite.a exists)
# - workflow_dispatch: Manual trigger for testing
# - workflow_call:    Reusable from .github/workflows/e2e-cloud.yml — caller
#                     can switch `libboxlite_source` to `build` to compile
#                     libboxlite.a from THIS checkout's Rust source (needed
#                     when apps/runner references C symbols that the
#                     latest tagged release's libboxlite.a doesn't have).
name: Build Runner Binary

on:
  workflow_run:
    workflows: ["Build C SDK"]
    types: [completed]
  workflow_dispatch:
  workflow_call:
    inputs:
      libboxlite_source:
        description: 'How to obtain libboxlite.a — "release" (download v${VERSION} tarball, default) or "build" (compile from this checkout)'
        type: string
        default: 'release'
        required: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  config:
    uses: ./.github/workflows/config.yml

  build:
    name: Build Runner (linux-amd64)
    needs: config
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ needs.config.outputs.go-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── libboxlite.a — TWO PATHS based on caller's libboxlite_source input ──
      # (a) "release" (default): download the prebuilt tarball that the
      #     v${VERSION} GitHub release shipped. Fast, used by main build
      #     after a "Build C SDK" workflow_run completes.
      # (b) "build": compile from THIS checkout's Rust source. Used by
      #     e2e-cloud so the runner binary picks up symbols that are
      #     ahead of the tagged release (e.g. boxlite_rest_options_set_path_prefix
      #     introduced after v0.9.5). BOXLITE_DEPS_STUB=2 skips the
      #     vendor -sys crates (bubblewrap/libkrun/e2fsprogs) and pulls
      #     their runtime tarball at startup — saves ~10 min vs full
      #     source build, still produces a fully-functional .a because
      #     vendor symbols aren't in the .a's exported table anyway.
      - name: Download prebuilt libboxlite.a (release mode)
        if: inputs.libboxlite_source != 'build'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_REPO: ${{ github.repository }}
        run: |
          ARCHIVE="boxlite-c-v${VERSION}-linux-x64-gnu.tar.gz"
          URL="https://github.com/${GH_REPO}/releases/download/v${VERSION}/${ARCHIVE}"
          echo "Downloading $URL"
          curl -fsSL "${URL}" | tar xz -C /tmp/
          cp "/tmp/boxlite-c-v${VERSION}-linux-x64-gnu/lib/libboxlite.a" sdks/go/libboxlite.a

      - name: Install Rust toolchain (build mode)
        if: inputs.libboxlite_source == 'build'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install Rust build system deps (build mode)
        if: inputs.libboxlite_source == 'build'
        # Subset of scripts/setup/setup-ubuntu.sh's apt list — only what
        # boxlite-c + boxlite-guest need under BOXLITE_DEPS_STUB=2:
        #   - musl-tools: musl-gcc for boxlite-guest static linking
        #   - gperf: build-libseccomp.sh uses it when compiling libseccomp.a
        #           for the musl target (libseccomp.a is not in apt for musl)
        #   - pkg-config: cargo build script dep resolution
        #   - protobuf-compiler: boxlite-shared's build.rs invokes protoc
        #   - libssl-dev: openssl-sys (transitive)
        # DEPS_STUB=2 skips the bubblewrap/libkrun/e2fsprogs path entirely,
        # so we DON'T need meson/ninja/libcap-dev/llvm/libclang-dev/etc.
        run: |
          sudo apt-get install -y --no-install-recommends \
            musl-tools gperf pkg-config protobuf-compiler libssl-dev

      - name: Build boxlite-guest (musl static, embedded into .a)
        if: inputs.libboxlite_source == 'build'
        env:
          BOXLITE_DEPS_STUB: "2"
        # boxlite-guest links libseccomp.a for the *target* triple
        # (x86_64-unknown-linux-musl). Ubuntu's libseccomp-dev only
        # provides the host .so. scripts/build/build-guest.sh sources
        # build-libseccomp.sh which cross-builds libseccomp.a from
        # upstream source into target/native/ and exports the env vars
        # libseccomp-sys's build.rs reads — same path build-c.yml takes
        # via `make setup:build guest`.
        run: |
          set -euo pipefail
          bash scripts/build/build-guest.sh --profile release

      - name: Build libboxlite.a from this checkout (build mode)
        if: inputs.libboxlite_source == 'build'
        env:
          BOXLITE_DEPS_STUB: "2"
        run: |
          set -euo pipefail
          cargo build --release -p boxlite-c
          bash scripts/build/fix-go-symbols.sh target/release/libboxlite.a
          mkdir -p sdks/go
          cp target/release/libboxlite.a sdks/go/libboxlite.a
          ls -lh sdks/go/libboxlite.a

      - name: Rewrite go.work for minimal modules
        run: |
          printf 'go 1.25.4\n\nuse (\n\t./runner\n\t./daemon\n\t./common-go\n\t./api-client-go\n\t./libs/computer-use\n\t../sdks/go\n)\n' > apps/go.work

      - name: Download Go dependencies
        run: |
          go -C apps/runner mod download
          go -C apps/daemon mod download
          go -C apps/common-go mod download
          go -C apps/api-client-go mod download
          go -C apps/libs/computer-use mod download

      - name: Build daemon
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -C apps \
            -ldflags "-X 'github.com/boxlite-ai/daemon/internal.Version=${VERSION}'" \
            -o runner/pkg/daemon/static/daemon-amd64 \
            ./daemon/cmd/daemon/

      - name: Build computer-use
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -C apps \
            -o runner/pkg/daemon/static/boxlite-computer-use \
            ./libs/computer-use/

      - name: Build runner
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -C apps \
            -ldflags "-X 'github.com/boxlite-ai/runner/internal.Version=${VERSION}'" \
            -o /tmp/boxlite-runner \
            ./runner/cmd/runner/

      - name: Package runner binary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tar czf "boxlite-runner-v${VERSION}-linux-amd64.tar.gz" -C /tmp boxlite-runner

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runner-linux-amd64
          path: boxlite-runner-v*-linux-amd64.tar.gz
          if-no-files-found: error
          retention-days: ${{ needs.config.outputs.artifact-retention-days }}

  upload-to-release:
    name: Upload to GitHub Release
    needs: [config, build]
    if: github.event_name == 'workflow_run' && github.event.workflow_run.event == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: runner-*
          merge-multiple: true

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/boxlite-runner-v*.tar.gz
          fail_on_unmatched_files: true
