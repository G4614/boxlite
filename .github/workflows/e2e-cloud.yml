# End-to-end suite against the deployed Tokyo stack — SDK → API → Runner → libkrun VM.
#
# Existing `make test:integration:*` uses the local PyO3 / FFI path
# (`Boxlite.default()`) and bypasses both the NestJS API and boxlite-runner,
# so bugs that surface only on the REST → API → runner chain (e.g. #563's
# exec-stdout drop, #627's attach re-drain) reach production without
# breaking CI. This workflow runs the full path against the always-on
# Tokyo stack (`boxlite-e2e-ci-*`), not a per-run local bootstrap.
#
# NOT-YET-REQUIRED: this workflow is currently NOT a branch-protection
# required check. The Tokyo stack's IAM OIDC role (provisioned by
# `scripts/ci/setup-e2e-cloud-oidc.sh`) and SSM Parameter Store entry
# `/boxlite/e2e-ci/admin-api-key` must exist before any run can pass.
# After the first green run, an admin should add the `E2E suite (Tokyo)`
# (or a re-introduced gate job's name) to branch protection on `main`.
# Trial runs available now via `workflow_dispatch`.
#
# Authentication: GitHub OIDC → AWS STS (no stored AWS credentials).
# Required AWS resources (provisioned by `scripts/ci/setup-e2e-cloud-oidc.sh`):
#   - OIDC identity provider (`token.actions.githubusercontent.com`)
#   - IAM role `boxlite-e2e-cloud-github-actions` (separate from
#     `boxlite-e2e-github-actions` which scopes to us-east-1 self-hosted
#     KVM runner provisioning).
#
# Required GitHub repo variables (Settings → Variables → Actions):
#   - `AWS_ACCOUNT_ID`           (shared with other workflows)
#   - `AWS_E2E_CLOUD_REGION`     (ap-northeast-1)
#   - `AWS_E2E_CLOUD_ROLE_ARN`   (arn:aws:iam::<acct>:role/boxlite-e2e-cloud-github-actions)
#
# Reads at runtime (must already exist in AWS, see apps/infra docs):
#   - SSM parameter `/boxlite/e2e-ci/admin-api-key`            (SecureString)
#   - ELB        `ApiLoadBalancer-*`                            (DNS resolved at runtime)
#   - ECS cluster `boxlite-e2e-ci-ClusterCluster-*` / service `Api`
#   - EC2 runner instance tagged `Name=boxlite-runner`
#   - S3 bucket  `boxlite-e2e-ci-storagebucket-*`               (build artifact staging)

name: E2E cloud

# No path filter on triggers: must always start so branch protection
# can require this workflow's gate as a status check. Path matching
# happens inside the `changes` job and gates the expensive `e2e` job.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Singleton lock — every run (every PR + every push) must serialize
# against the SHARED Tokyo stack. Per-ref grouping is wrong here:
# PR-A and PR-B have different refs but compete for the same ECS
# service / runner binary / RDS row. cancel-in-progress: false because
# a half-applied ECS rolling update is worse than waiting.
concurrency:
  group: e2e-cloud-shared
  cancel-in-progress: false

env:
  # AWS identifiers come from repo variables (same pattern as
  # .github/workflows/e2e-test.yml). `vars.*` is stripped by GitHub
  # for fork-PR runs, but this workflow is gated on same-repo branches
  # (push to main + workflow_dispatch + same-repo PR), so the context
  # is always populated. Set via repo Settings → Variables:
  #   AWS_ACCOUNT_ID, AWS_E2E_CLOUD_REGION, AWS_E2E_CLOUD_ROLE_ARN
  # Keeps the account ID out of the public repo source — defense in
  # depth (AWS treats account ID as "sensitive, not secret", but no
  # reason to surface it when we don't have to).
  AWS_REGION: ${{ vars.AWS_E2E_CLOUD_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_E2E_CLOUD_ROLE_ARN }}
  STAGE: e2e-ci
  STACK_PREFIX: boxlite-e2e-ci
  ECS_CLUSTER_PATTERN: boxlite-e2e-ci-ClusterCluster-
  ADMIN_ORG_ID: 4a1eef70-8734-4814-b7a5-0ca3522a8760
  ECR_REPO: sst-asset

jobs:
  # Cheap detector on GitHub-hosted runner: decide if the expensive
  # e2e job needs to fire. Avoids burning deploy+test cycle time
  # on PRs that don't touch any code path the suite exercises.
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      # Each downstream job/step gates on the narrow component that
      # would actually be invalidated by its source paths, instead of
      # one giant `relevant` flag — saves the ~11 min libboxlite +
      # runner build chain when a PR only touches API or SDK code.
      api: ${{ steps.filter.outputs.api }}
      runner_chain: ${{ steps.filter.outputs.runner_chain }}
      sdk_py: ${{ steps.filter.outputs.sdk_py }}
      tests_or_workflow: ${{ steps.filter.outputs.tests_or_workflow }}
      any: ${{ steps.filter.outputs.api == 'true' || steps.filter.outputs.runner_chain == 'true' || steps.filter.outputs.sdk_py == 'true' || steps.filter.outputs.tests_or_workflow == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # API container — apps/api Dockerfile.source bakes from these.
            api:
              - 'apps/api/**'
              - 'apps/dashboard/**'
              - 'apps/libs/**'
            # Runner binary build chain. libboxlite.a (Rust src/**) is
            # statically linked into the runner via CGo, so any Rust src
            # change OR any Go runner-side change invalidates the runner
            # binary. Touching scripts/build/** also invalidates the
            # libboxlite build chain output.
            runner_chain:
              - 'apps/runner/**'
              - 'apps/daemon/**'
              - 'apps/common-go/**'
              - 'apps/api-client-go/**'
              - 'apps/libs/computer-use/**'
              - 'sdks/go/**'
              - 'src/boxlite/**'
              - 'src/api-client/**'
              - 'src/shared/**'
              - 'src/deps/**'
              - 'scripts/build/**'
              - 'sdks/c/src/exec/**'
            # Python SDK. PyO3 wheel pulls libboxlite.a sources too via
            # boxlite-c crate, so Rust src changes also invalidate the
            # SDK. (No separate "sdk needs libboxlite rebuild" output —
            # build_c_sdk gates on either runner_chain or sdk_py.)
            sdk_py:
              - 'sdks/python/**'
            # Test code + workflow self-modifications. Doesn't trigger
            # any rebuild — just runs the existing deployed stack.
            tests_or_workflow:
              - 'scripts/test/e2e/**'
              - '.github/workflows/e2e-cloud.yml'
              - '.github/workflows/build-runner-binary.yml'
              - '.github/workflows/build-c.yml'

  # Build libboxlite.a from THIS PR's Rust source using the existing
  # build-c.yml workflow (manylinux container, libseccomp.a cross-build,
  # fix-go-symbols.sh — same chain release builds use). target_filter
  # constrains the matrix to just linux-x64-gnu (skip macos-15 +
  # ubuntu-24.04-arm matrix entries; Tokyo runner is amd64).
  # Uploads artifact c-sdk-linux-x64-gnu consumed by build_runner.
  #
  # Fires only when libboxlite source OR runner Go OR Python SDK
  # changed — pure API / dashboard / test-code PRs skip the ~9 min
  # libboxlite compile entirely.
  build_c_sdk:
    name: Build C SDK (from PR source, linux-x64-gnu only)
    needs: changes
    if: |
      needs.changes.outputs.runner_chain == 'true'
      || needs.changes.outputs.sdk_py == 'true'
      || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-c.yml
    with:
      target_filter: linux-x64-gnu
    permissions:
      contents: write

  # Build the runner binary from THIS PR's source. Reuses
  # .github/workflows/build-runner-binary.yml with libboxlite_source=build,
  # which downloads the c-sdk-linux-x64-gnu artifact from build_c_sdk
  # above (instead of pulling the release tarball). The e2e job
  # downloads the produced runner-linux-amd64 artifact and SSM-deploys
  # it to the Tokyo runner EC2.
  #
  # Fires only when runner_chain changed. Pure API/SDK/test PRs skip
  # the ~2 min Go build + the EC2 self-update step downstream.
  build_runner:
    name: Build runner binary (from PR source)
    needs: [changes, build_c_sdk]
    if: |
      needs.changes.outputs.runner_chain == 'true'
      || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-runner-binary.yml
    with:
      libboxlite_source: build
    # Inherit workflow defaults — the called workflow's `upload-to-release`
    # job declares `contents: write`, and explicitly setting `contents: read`
    # at the caller would fail GHA's "called job requests more permissions
    # than caller grants" startup check even though that job's `if:` would
    # skip it for our workflow_call invocation.
    permissions:
      contents: write

  e2e:
    name: E2E suite (Tokyo)
    needs: [changes, build_c_sdk, build_runner]
    # Default GHA semantics: a job whose `needs:` is SKIPPED also gets
    # skipped. Override via !failure() && !cancelled() — runs as long
    # as nothing in the upstream chain actively failed (skipped is OK,
    # which is exactly what happens on pure API / test PRs).
    if: |
      !failure() && !cancelled()
      && (needs.changes.outputs.any == 'true' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: e2e-cloud-${{ github.run_id }}

      # ──────────────────────────────────────────────────────────────────
      # Resolve runtime resource identifiers. Cluster suffix is random
      # per stack instantiation; runner instance id is found by Name
      # tag, not hardcoded — so SST teardown/recreate doesn't break CI.
      # Each lookup is GUARDED by an exact count assertion: if more
      # than one candidate matches the pattern (e.g. orphan ALB from a
      # failed teardown), the workflow fails loudly instead of silently
      # binding to the wrong resource.
      # ──────────────────────────────────────────────────────────────────
      - name: Resolve stack resources
        id: resources
        run: |
          set -euo pipefail

          assert_one() {
              local kind="$1" count="$2"
              if [ "$count" -ne 1 ]; then
                  echo "::error::Expected exactly 1 $kind, found $count — clean up orphans before re-running."
                  exit 1
              fi
          }

          CLUSTER_COUNT=$(aws ecs list-clusters \
            --query "length(clusterArns[?contains(@, '${ECS_CLUSTER_PATTERN}')])" --output text)
          assert_one "ECS cluster matching ${ECS_CLUSTER_PATTERN}" "$CLUSTER_COUNT"
          CLUSTER=$(aws ecs list-clusters \
            --query "clusterArns[?contains(@, '${ECS_CLUSTER_PATTERN}')]|[0]" \
            --output text | awk -F/ '{print $NF}')
          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"

          LB_COUNT=$(aws elbv2 describe-load-balancers \
            --query "length(LoadBalancers[?starts_with(LoadBalancerName,'ApiLoadBalancer-')])" --output text)
          assert_one "ApiLoadBalancer-*" "$LB_COUNT"
          API_LB_DNS=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'ApiLoadBalancer-')]|[0].DNSName" \
            --output text)
          API_LB_TG_ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName,'ApiLoadBalancer-')]|[0].LoadBalancerArn" \
            --output text \
            | xargs -I{} aws elbv2 describe-target-groups --load-balancer-arn {} \
                --query "TargetGroups[0].TargetGroupArn" --output text)
          echo "api_lb_dns=$API_LB_DNS" >> "$GITHUB_OUTPUT"
          echo "api_lb_tg_arn=$API_LB_TG_ARN" >> "$GITHUB_OUTPUT"

          RUNNER_COUNT=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=boxlite-runner" "Name=instance-state-name,Values=running" \
            --query "length(Reservations[].Instances[])" --output text)
          assert_one "boxlite-runner EC2 instance" "$RUNNER_COUNT"
          RUNNER_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=boxlite-runner" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)
          echo "runner_id=$RUNNER_ID" >> "$GITHUB_OUTPUT"

          BUCKET_COUNT=$(aws s3api list-buckets \
            --query "length(Buckets[?starts_with(Name,'${STACK_PREFIX}-storagebucket-')])" --output text)
          assert_one "${STACK_PREFIX}-storagebucket-* S3 bucket" "$BUCKET_COUNT"
          S3_BUCKET=$(aws s3api list-buckets \
            --query "Buckets[?starts_with(Name,'${STACK_PREFIX}-storagebucket-')].Name|[0]" \
            --output text)
          echo "s3_bucket=$S3_BUCKET" >> "$GITHUB_OUTPUT"

          # Preflight: ECR repo must exist (hardcoded SST default — fail
          # fast if SST is reconfigured to a per-stage repo).
          aws ecr describe-repositories --repository-names "${ECR_REPO}" >/dev/null \
            || { echo "::error::ECR repo ${ECR_REPO} not found — SST may have been reconfigured. Update ECR_REPO env in this workflow."; exit 1; }

          # Preflight: SSM agent on runner must be online (avoid 5-minute
          # queue-and-timeout if the agent is dead).
          PING=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$RUNNER_ID" \
            --query "InstanceInformationList[0].PingStatus" --output text)
          if [ "$PING" != "Online" ]; then
              echo "::error::SSM agent on runner $RUNNER_ID is not Online (PingStatus=$PING) — runner binary update would hang."
              exit 1
          fi

          echo "::notice::cluster=$CLUSTER api_lb=$API_LB_DNS runner=$RUNNER_ID (SSM=Online) s3=$S3_BUCKET"

      # ──────────────────────────────────────────────────────────────────
      # Build & push Api container image (Node.js / NestJS), tag = git sha.
      # ──────────────────────────────────────────────────────────────────
      - name: ECR login
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Api image (source mode via tsx, no webpack)
        id: build_api
        if: |
          needs.changes.outputs.api == 'true'
          || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          REGISTRY="${{ steps.ecr_login.outputs.registry }}"
          IMAGE="${REGISTRY}/${ECR_REPO}:api-${{ github.sha }}"
          # Use apps/api/Dockerfile.source — runs TS directly via tsx at
          # container runtime, NO webpack build, NO dashboard build, NO
          # strict TS type-check gate. See that file's header for rationale.
          # Build context = repo root (Dockerfile references apps/libs/...).
          docker buildx build --platform linux/amd64 --load \
            -f apps/api/Dockerfile.source -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # ──────────────────────────────────────────────────────────────────
      # Download runner binary built by the `build_runner` job (which
      # reuses .github/workflows/build-runner-binary.yml via workflow_call
      # with libboxlite_source=build so libboxlite.a is compiled from
      # THIS PR's source, not the v${VERSION} tarball).
      # Push to the stack's S3 bucket, then SSM the Tokyo runner EC2
      # to download + hot-swap the systemd binary.
      # ──────────────────────────────────────────────────────────────────
      - name: Download runner binary artifact
        if: |
          needs.changes.outputs.runner_chain == 'true'
          || github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: runner-linux-amd64
          path: /tmp/runner-artifact/

      # ──────────────────────────────────────────────────────────────────
      # Polling-based deploy (zero IAM mutation required):
      #
      # 1. Upload binary to s3://${bucket}/builds/runner-deploy/binary.tar.gz
      # 2. Write request marker s3://.../builds/runner-deploy/request-${SHA}.txt
      # 3. EC2 poller (systemd timer installed once via PowerUserAccess
      #    SSM, NOT via this workflow) picks up request, swaps binary,
      #    writes done-${SHA}.txt with "OK" or "FAIL: ..." status
      # 4. We poll for done-${SHA}.txt, gate on its content
      #
      # This replaces the original `aws ssm send-command` path which
      # needed an IAM policy update (split condition on the
      # AWS-RunShellScript document — blocked without admin perms).
      # Now the only AWS interaction here is S3, which is already
      # in our role's policy (`s3:PutObject`/`GetObject` on
      # `${stack_prefix}-storagebucket-*/builds/*`).
      # ──────────────────────────────────────────────────────────────────
      - name: Upload runner binary to S3 + wait for runner self-update
        if: |
          needs.changes.outputs.runner_chain == 'true'
          || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          S3_BUCKET="${{ steps.resources.outputs.s3_bucket }}"
          ARCHIVE=$(ls /tmp/runner-artifact/boxlite-runner-*-linux-amd64.tar.gz | head -1)
          [ -n "$ARCHIVE" ] || { echo "::error::No runner artifact found"; exit 1; }

          PREFIX="builds/runner-deploy"
          BIN_KEY="${PREFIX}/binary.tar.gz"
          REQ_KEY="${PREFIX}/request-${GITHUB_SHA}.txt"
          DONE_KEY="${PREFIX}/done-${GITHUB_SHA}.txt"

          # 1) Upload binary (canonical name; overwrite OK because the
          #    workflow concurrency group is a singleton lock).
          aws s3 cp "$ARCHIVE" "s3://${S3_BUCKET}/${BIN_KEY}"
          echo "::notice::Binary uploaded to s3://${S3_BUCKET}/${BIN_KEY}"

          # 2) Write request marker — content = git SHA so the poller
          #    knows which request to answer with the matching done key.
          printf 'sha=%s\nrequested_at=%s\n' \
              "${GITHUB_SHA}" \
              "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              | aws s3 cp - "s3://${S3_BUCKET}/${REQ_KEY}"
          echo "::notice::Request marker written to s3://${S3_BUCKET}/${REQ_KEY}"

          # 3) Wait for the poller (runs every 30s on the Tokyo EC2)
          #    to claim the request and write a done marker. Cap at
          #    120 s (poller cron 30 s + binary swap 5 s + service
          #    start 5 s = ~60 s typical; double for slack).
          echo "Waiting for runner self-update (max 120 s)..."
          for i in $(seq 1 24); do
              sleep 5
              if aws s3api head-object \
                  --bucket "$S3_BUCKET" --key "$DONE_KEY" \
                  >/dev/null 2>&1; then
                  STATUS=$(aws s3 cp "s3://${S3_BUCKET}/${DONE_KEY}" - 2>/dev/null | head -1 || echo "")
                  echo "::notice::Runner deploy status: $STATUS"
                  case "$STATUS" in
                      OK*)
                          echo "::notice::Runner self-update complete (SHA ${GITHUB_SHA})"
                          exit 0 ;;
                      FAIL*)
                          echo "::error::Runner self-update failed: $STATUS"
                          # Pull full body for context
                          aws s3 cp "s3://${S3_BUCKET}/${DONE_KEY}" - 2>/dev/null || true
                          exit 1 ;;
                      *)
                          echo "::error::Unexpected status from poller: $STATUS"
                          exit 1 ;;
                  esac
              fi
              echo "  [$i/24] waiting for done-${GITHUB_SHA}.txt..."
          done
          echo "::error::Runner self-update timed out after 120 s — poller offline or SSM agent down?"
          exit 1

      # ──────────────────────────────────────────────────────────────────
      # Deploy: register new Api task definition with the new image (all
      # other env vars preserved verbatim), force-redeploy the service,
      # wait for stable, then verify the ALB target group reports healthy.
      # `wait services-stable` alone is NOT sufficient — ECS service can
      # be stable before the ALB health check passes; an immediate test
      # run can race a 503 from the LB.
      # ──────────────────────────────────────────────────────────────────
      - name: Deploy Api (rolling)
        if: |
          needs.changes.outputs.api == 'true'
          || github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.resources.outputs.cluster }}"
          IMAGE="${{ steps.build_api.outputs.image }}"
          TG_ARN="${{ steps.resources.outputs.api_lb_tg_arn }}"

          OLD_TD_ARN=$(aws ecs describe-services --cluster "$CLUSTER" --services Api \
            --query 'services[0].taskDefinition' --output text)
          echo "Old TD: $OLD_TD_ARN"

          # jq deep-clone the task def, swap container image, strip
          # readonly fields. The task def env contains plaintext
          # DB_PASSWORD; never `cat`/echo new-td.json — it goes
          # straight to AWS via --cli-input-json.
          aws ecs describe-task-definition --task-definition "$OLD_TD_ARN" \
            --query 'taskDefinition' --output json \
            | jq --arg img "$IMAGE" '
                .containerDefinitions[0].image = $img
                | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                      .compatibilities, .registeredAt, .registeredBy)' \
            > /tmp/new-td.json

          NEW_TD_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/new-td.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "New TD: $NEW_TD_ARN"

          aws ecs update-service --cluster "$CLUSTER" --service Api \
            --task-definition "$NEW_TD_ARN" --force-new-deployment \
            >/dev/null
          aws ecs wait services-stable --cluster "$CLUSTER" --services Api
          echo "Service stable — verifying PRIMARY is NEW_TD..."

          # ECS DeploymentCircuitBreaker auto-rolls-back when new tasks
          # keep failing to start. After rollback the SERVICE is stable
          # again (running == desired on the OLD td), so `wait
          # services-stable` returns success and the ALB target group
          # reports healthy — but the new image is NOT running. Both
          # the ALB check and `/api/health` below would talk to the
          # OLD tasks and answer 2xx, masking a failed deploy.
          # Explicitly assert the PRIMARY deployment's taskDefinition
          # equals NEW_TD_ARN. If it differs, ECS rolled back.
          PRIMARY_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services Api \
              --query 'services[0].deployments[?status==`PRIMARY`]|[0].taskDefinition' \
              --output text)
          if [ "$PRIMARY_TD" != "$NEW_TD_ARN" ]; then
              echo "::error::ECS rolled back. PRIMARY=$PRIMARY_TD expected $NEW_TD_ARN"
              # Pull stop reasons from recent failed tasks for context
              aws ecs list-tasks --cluster "$CLUSTER" --service-name Api \
                  --desired-status STOPPED --max-results 5 \
                  --query 'taskArns' --output text \
                | tr '\t' '\n' | head -3 \
                | while read -r TASK; do
                    [ -n "$TASK" ] || continue
                    echo "--- stopped task $(basename "$TASK") ---"
                    aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK" \
                        --query 'tasks[0].[stoppedReason,containers[0].exitCode,containers[0].reason]' \
                        --output text || true
                  done
              exit 1
          fi
          echo "::notice::PRIMARY deployment confirmed on $NEW_TD_ARN"

          # Now verify the ALB target group is actually serving — wait
          # for at least one healthy target. Up to ~3 minutes for health
          # check thresholds to clear.
          for i in $(seq 1 18); do
              HEALTHY=$(aws elbv2 describe-target-health \
                --target-group-arn "$TG_ARN" \
                --query "length(TargetHealthDescriptions[?TargetHealth.State=='healthy'])" \
                --output text)
              if [ "$HEALTHY" -ge 1 ]; then
                  echo "::notice::ALB target group reports $HEALTHY healthy target(s)"
                  break
              fi
              echo "ALB target group has 0 healthy targets — retry $i/18 in 10s"
              sleep 10
          done
          [ "$HEALTHY" -ge 1 ] || { echo "::error::ALB target group never reported healthy"; exit 1; }

          # Belt-and-suspenders: hit /api/health through the LB
          API_DNS="${{ steps.resources.outputs.api_lb_dns }}"
          curl -fsS --retry 6 --retry-delay 5 --retry-all-errors --max-time 10 \
               -o /dev/null "http://${API_DNS}/api/health"
          echo "::notice::/api/health returned 2xx"

      # ──────────────────────────────────────────────────────────────────
      # Runner binary deploy is also omitted (no rebuild step above).
      # See the "Runner binary rebuild is INTENTIONALLY OMITTED" note
      # earlier in this job. The deployed Tokyo runner EC2's existing
      # binary stays in place.
      # ──────────────────────────────────────────────────────────────────

      # ──────────────────────────────────────────────────────────────────
      # One-time init: admin-org sandbox quota. Naturally idempotent
      # because the SET clause always writes the same target values; we
      # drop the `AND max_cpu_per_box=0` guard the first draft had —
      # it prevented convergence from partial-update states. The SELECT
      # afterwards prints the post-state for the workflow log.
      #
      # Credentials: ECS Exec into the Api container so DB_PASSWORD is
      # read from the container's env at runtime, not from the SSM
      # command body. The outer single-quotes prevent the GHA shell
      # from expanding $DB_PASSWORD/$DB_HOST/etc. — they only resolve
      # inside the container.
      # ──────────────────────────────────────────────────────────────────
      - name: Init admin-org sandbox quota (idempotent)
        run: |
          set -euo pipefail
          CLUSTER="${{ steps.resources.outputs.cluster }}"

          # Pick a task that belongs to the PRIMARY deployment (avoids
          # picking the still-draining old task during a rolling deploy).
          PRIMARY_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services Api \
            --query 'services[0].deployments[?status==`PRIMARY`]|[0].taskDefinition' --output text)
          TASK=$(aws ecs list-tasks --cluster "$CLUSTER" --service-name Api \
            --query 'taskArns[]' --output text \
            | tr '\t' '\n' \
            | while read -r arn; do
                TD=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$arn" \
                    --query 'tasks[0].taskDefinitionArn' --output text)
                if [ "$TD" = "$PRIMARY_TD" ]; then echo "$arn"; break; fi
            done)
          [ -n "$TASK" ] || { echo "::error::No Api task on PRIMARY deployment"; exit 1; }
          echo "Api task on PRIMARY deployment: $TASK"

          # Capture the ECS Exec session output to a temp file so we can
          # grep it for the SELECT result. --interactive is required by
          # ECS Exec, but a non-TTY shell works because we feed nothing
          # to stdin and our `sh -c '…'` exits immediately after psql.
          OUT=/tmp/ecs_exec.log
          # psql flags:
          #   -A          unaligned output (no column padding, no wrapping)
          #   -t          tuples only (omit header + footer rows)
          #   -P pager=off  defensive — psql defaults to less/more when
          #                 attached to a TTY-like session even with --interactive,
          #                 which wraps long lines and adds "--More--" prompts
          #                 that broke the previous grep
          # PAGER=cat       belt-and-braces in case psql calls $PAGER directly
          aws ecs execute-command --cluster "$CLUSTER" --task "$TASK" --container Api --interactive \
            --command 'sh -c "PAGER=cat PGPASSWORD=\"\$DB_PASSWORD\" psql -h \"\$DB_HOST\" -U \"\$DB_USERNAME\" -d \"\$DB_DATABASE\" -A -t -P pager=off -v ON_ERROR_STOP=1 -c \"UPDATE \\\"organization\\\" SET max_cpu_per_box=4, max_memory_per_box=8192, max_disk_per_box=20 WHERE id='\''4a1eef70-8734-4814-b7a5-0ca3522a8760'\''; SELECT id, max_cpu_per_box, max_memory_per_box, max_disk_per_box FROM \\\"organization\\\" WHERE id='\''4a1eef70-8734-4814-b7a5-0ca3522a8760'\'';\""' \
            2>&1 | tee "$OUT"

          # Verify the SELECT result actually shows the target values.
          # With -A -t output, the SELECT row is one line: "<uuid>|4|8192|20".
          # ECS Exec exit-code propagation through Session Manager is
          # historically unreliable; grep the output as ground truth.
          #
          # ECS Exec routes through SSM Session Manager, which uses CRLF
          # line endings, so each output line has a trailing \r. Strip
          # CR before greping so the `$` anchor matches reliably.
          tr -d '\r' < "$OUT" \
            | grep -E '\|4\|8192\|20$' \
            || { echo "::error::admin-org quota SELECT did not show target values (|4|8192|20)"; exit 1; }

      # ──────────────────────────────────────────────────────────────────
      # Build SDK from THIS checkout (path_prefix and other source-tree
      # additions may be ahead of the PyPI release with the same version
      # string). Required so tests exercise the code under review.
      # ──────────────────────────────────────────────────────────────────
      - name: Build & install Python SDK from this checkout
        # BOXLITE_DEPS_STUB=1 skips the vendor-submodule builds
        # (bubblewrap, libkrun, e2fsprogs) — those are needed only by the
        # runner inside the EC2 host, not by the Python SDK / pytest
        # client. The repo's src/deps/*-sys build.rs files all honor
        # this env var and emit a no-op `/nonexistent` linker hint.
        # Avoids needing `git submodule update --init --recursive` +
        # meson/ninja in the GHA runner image.
        #
        # protoc is required by boxlite-shared's build.rs (gRPC proto
        # compilation); ubuntu-latest doesn't preinstall it.
        env:
          BOXLITE_DEPS_STUB: "1"
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends protobuf-compiler
          cd sdks/python
          pip install --break-system-packages --quiet maturin
          maturin build --release
          pip install --break-system-packages --force-reinstall ../../target/wheels/boxlite-*.whl
          pip install --break-system-packages --quiet pytest pytest-asyncio pytest-timeout

      # ──────────────────────────────────────────────────────────────────
      # Pytest configuration: write the profile pointing at Tokyo API LB,
      # admin key sourced from SSM Parameter Store and immediately
      # registered as a GHA log mask so it can never leak into the run
      # log even if a later step accidentally `echo`s credentials.toml.
      # Use printf with quoted args so a `$` inside the secret can't
      # be shell-expanded.
      # ──────────────────────────────────────────────────────────────────
      - name: Configure pytest profile p1
        run: |
          set -euo pipefail
          API_DNS="${{ steps.resources.outputs.api_lb_dns }}"
          ADMIN_KEY=$(aws ssm get-parameter \
            --name "/boxlite/${STAGE}/admin-api-key" \
            --with-decryption \
            --query Parameter.Value --output text)
          # Register the value as a masked secret BEFORE it could ever
          # appear in subsequent logging.
          echo "::add-mask::$ADMIN_KEY"

          # The Python SDK's REST client builds URLs as
          # `{url}/v1/{path_prefix}/{endpoint}` (api-routes proxied by
          # apps/api/src/boxlite-rest/boxlite-{box,proxy}.controller.ts,
          # `@Controller('v1/:prefix/boxes')`). The `:prefix` is the
          # caller's organization-scoped path prefix, returned by
          # `GET /api/v1/me` for the admin API key. Without it the
          # SDK hits `/api/v1/boxes` which the NestJS router does NOT
          # match (404 "Cannot POST /api/v1/boxes").
          PATH_PREFIX=$(curl -fsS -H "Authorization: Bearer $ADMIN_KEY" \
            "http://${API_DNS}/api/v1/me" | python3 -c 'import json,sys; print(json.load(sys.stdin)["path_prefix"])')
          [ -n "$PATH_PREFIX" ] || { echo "::error::Empty path_prefix from /api/v1/me"; exit 1; }
          echo "Resolved path_prefix=${PATH_PREFIX}"

          mkdir -p ~/.boxlite
          chmod 700 ~/.boxlite
          {
              printf '[profiles.p1]\n'
              printf 'url = "http://%s/api"\n'  "$API_DNS"
              printf 'api_key = "%s"\n'         "$ADMIN_KEY"
              printf 'path_prefix = "%s"\n'     "$PATH_PREFIX"
          } > ~/.boxlite/credentials.toml
          chmod 600 ~/.boxlite/credentials.toml

          # Register snapshots the e2e suite needs. POST /api/snapshots
          # is async — the runner pulls the image in the background and
          # the snapshot row transitions PENDING → PULLING → ACTIVE.
          # Box creation requires ACTIVE state, so poll until each
          # snapshot reports active.
          export ADMIN_KEY API_DNS
          python3 - <<'PY'
          import json, os, sys, time, urllib.request, urllib.error, urllib.parse
          API = f"http://{os.environ['API_DNS']}/api"
          KEY = os.environ['ADMIN_KEY']
          SNAPS = ["alpine:3.23", "ubuntu:22.04", "ubuntu:24.04"]
          WAIT  = 240  # seconds per snapshot

          def req(method, path, body=None):
              r = urllib.request.Request(
                  API + path, method=method,
                  headers={"Authorization": f"Bearer {KEY}",
                           "Content-Type": "application/json"},
                  data=json.dumps(body).encode() if body is not None else None,
              )
              try:
                  with urllib.request.urlopen(r, timeout=30) as resp:
                      return resp.status, json.loads(resp.read() or "null")
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read() or "null")

          def state_of(name):
              s, b = req("GET", f"/snapshots?name={urllib.parse.quote(name)}")
              if s != 200: return None
              for it in (b or {}).get("items", []):
                  if it.get("name") == name:
                      return it.get("state")
              return None

          for name in SNAPS:
              st = state_of(name)
              if st is None:
                  s, b = req("POST", "/snapshots",
                             {"name": name, "imageName": name,
                              "cpu": 1, "memory": 1, "disk": 2})
                  if s not in (200, 201):
                      sys.exit(f"POST /snapshots {name} → {s} {b}")
                  print(f"  created {name}")
              else:
                  print(f"  {name}: existing state={st}")

              deadline = time.time() + WAIT
              while time.time() < deadline:
                  st = state_of(name)
                  if st == "active":
                      print(f"  {name}: active ✓"); break
                  if st in ("error", "build_failed"):
                      sys.exit(f"  {name}: {st}")
                  time.sleep(5)
              else:
                  sys.exit(f"  {name} not active within {WAIT}s (last state={st})")
          PY
          unset ADMIN_KEY

      - name: Run E2E suite
        env:
          BOXLITE_E2E_SKIP_PATH_VERIFY: '1'
          BOXLITE_E2E_PROFILE: p1
        run: |
          # pytest-timeout caps individual test wall time so a hung VM /
          # wedged exec doesn't burn the full 45-minute job timeout (which
          # would prevent the on-failure log capture step from running).
          timeout 35m python3 -m pytest scripts/test/e2e/cases/ \
              -v --tb=short --no-header -p no:cacheprovider \
              --timeout=180 --timeout-method=thread \
              --junit-xml=pytest-junit.xml

      - name: Upload pytest junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: pytest-junit.xml
          if-no-files-found: ignore

      # ──────────────────────────────────────────────────────────────────
      # On failure, pull the last 200 lines from each side. CloudWatch
      # for the Api container (its stdout is shipped via awslogs driver);
      # runner journalctl via SSM with a short poll loop instead of a
      # fixed sleep.
      # ──────────────────────────────────────────────────────────────────
      - name: Collect logs on failure
        if: failure()
        continue-on-error: true
        run: |
          set +e
          CLUSTER="${{ steps.resources.outputs.cluster }}"
          RUNNER="${{ steps.resources.outputs.runner_id }}"
          API_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services Api \
            --query 'services[0].taskDefinition' --output text)
          LOG_GROUP=$(aws ecs describe-task-definition --task-definition "$API_TD" \
            --query 'taskDefinition.containerDefinitions[0].logConfiguration.options."awslogs-group"' --output text)
          echo "──── Api CloudWatch logs (last 500) ────"
          aws logs tail "$LOG_GROUP" --since 20m --format short | tail -500

          echo "──── boxlite-runner journalctl (last 500) ────"
          CMD_ID=$(aws ssm send-command --instance-ids "$RUNNER" \
            --document-name AWS-RunShellScript --comment "e2e-cloud failure log dump" \
            --parameters 'commands=["journalctl -u boxlite-runner --no-pager -n 500"]' \
            --query Command.CommandId --output text)
          for _ in $(seq 1 12); do
              SS=$(aws ssm get-command-invocation --command-id "$CMD_ID" \
                  --instance-id "$RUNNER" --query Status --output text 2>/dev/null || echo Pending)
              case "$SS" in
                  Success|Failed|Cancelled|TimedOut) break ;;
                  *) sleep 3 ;;
              esac
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$RUNNER" \
            --query StandardOutputContent --output text | tail -500

  # NOTE: an `e2e-gate` consolidation job has been INTENTIONALLY OMITTED
  # for now. The gate's purpose is to give branch protection a stable
  # always-reported status check — but adding it back as a required check
  # before the Tokyo stack's AWS prerequisites are provisioned would block
  # every PR (the e2e job has no path to succeed until then). Re-introduce
  # the gate (and add it to branch protection) once a first green run
  # against Tokyo is observed.
