# End-to-end suite against the deployed Tokyo stack — SDK → API → Runner → libkrun VM.
#
# Existing `make test:integration:*` uses the local PyO3 / FFI path
# (`Boxlite.default()`) and bypasses both the NestJS API and boxlite-runner,
# so bugs that surface only on the REST → API → runner chain (e.g. #563's
# exec-stdout drop, #627's attach re-drain) reach production without
# breaking CI. This workflow runs the full path against the always-on
# Tokyo stack (`boxlite-e2e-ci-*`), not a per-run local bootstrap.
#
# NOT-YET-REQUIRED: this workflow is currently NOT a branch-protection
# required check. The Tokyo stack's IAM OIDC role (provisioned by
# `scripts/ci/setup-e2e-cloud-oidc.sh`) and SSM Parameter Store entry
# `/boxlite/e2e-ci/admin-api-key` must exist before any run can pass.
# After the first green run, an admin should add the `E2E suite (Tokyo)`
# (or a re-introduced gate job's name) to branch protection on `main`.
# Trial runs available now via `workflow_dispatch`.
#
# Authentication: GitHub OIDC → AWS STS (no stored AWS credentials).
# Required AWS resources (provisioned by `scripts/ci/setup-e2e-cloud-oidc.sh`):
#   - OIDC identity provider (`token.actions.githubusercontent.com`)
#   - IAM role `boxlite-e2e-cloud-github-actions` (separate from
#     `boxlite-e2e-github-actions` which scopes to us-east-1 self-hosted
#     KVM runner provisioning).
#
# Required GitHub repo variables (Settings → Variables → Actions):
#   - `AWS_ACCOUNT_ID`           (shared with other workflows)
#   - `AWS_E2E_CLOUD_REGION`     (ap-northeast-1)
#   - `AWS_E2E_CLOUD_ROLE_ARN`   (arn:aws:iam::<acct>:role/boxlite-e2e-cloud-github-actions)
#
# Reads at runtime (must already exist in AWS, see apps/infra docs):
#   - SSM parameter `/boxlite/e2e-ci/admin-api-key`            (SecureString)
#   - ELB        `ApiLoadBalancer-*`                            (DNS resolved at runtime)
#   - ECS cluster `boxlite-e2e-ci-ClusterCluster-*` / service `Api`
#   - EC2 runner instance tagged `Name=boxlite-runner`
#   - S3 bucket  `boxlite-e2e-ci-storagebucket-*`               (build artifact staging)

name: E2E cloud

# Runs only on push-to-main and manual dispatch — PR triggering would
# serialize every PR against the shared Tokyo stack (see concurrency
# below), and the E2E suite is too slow to gate every PR on. Path
# matching happens inside the `changes` job and gates the expensive
# `e2e` job.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Default GITHUB_TOKEN to read-only. Each job that needs more (OIDC,
# release writes) opts in via its own job-level permissions block.
permissions:
  contents: read

# Singleton lock — every run must serialize against the SHARED Tokyo
# stack. Per-ref grouping is wrong here: two merges to main race on
# the same ECS service / runner binary / RDS row. cancel-in-progress:
# false because a half-applied ECS rolling update is worse than waiting.
concurrency:
  group: e2e-cloud-shared
  cancel-in-progress: false

env:
  # AWS identifiers come from repo variables (same pattern as
  # .github/workflows/e2e-test.yml). Set via repo Settings → Variables:
  #   AWS_ACCOUNT_ID, AWS_E2E_CLOUD_REGION, AWS_E2E_CLOUD_ROLE_ARN
  # Keeps the account ID out of the public repo source — defense in
  # depth (AWS treats account ID as "sensitive, not secret", but no
  # reason to surface it when we don't have to).
  AWS_REGION: ${{ vars.AWS_E2E_CLOUD_REGION }}
  AWS_ROLE_ARN: ${{ vars.AWS_E2E_CLOUD_ROLE_ARN }}
  STAGE: e2e-ci
  STACK_PREFIX: boxlite-e2e-ci
  ECS_CLUSTER_PATTERN: boxlite-e2e-ci-ClusterCluster-
  ADMIN_ORG_ID: 4a1eef70-8734-4814-b7a5-0ca3522a8760
  ECR_REPO: sst-asset

jobs:
  # Cheap detector on GitHub-hosted runner: decide if the expensive
  # e2e job needs to fire. Avoids burning deploy+test cycle time
  # on PRs that don't touch any code path the suite exercises.
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      # Each downstream job/step gates on the narrow component that
      # would actually be invalidated by its source paths, instead of
      # one giant `relevant` flag — saves the ~11 min libboxlite +
      # runner build chain when a PR only touches API or SDK code.
      api: ${{ steps.filter.outputs.api }}
      runner_chain: ${{ steps.filter.outputs.runner_chain }}
      sdk_py: ${{ steps.filter.outputs.sdk_py }}
      tests_or_workflow: ${{ steps.filter.outputs.tests_or_workflow }}
      proxy: ${{ steps.filter.outputs.proxy }}
      otel_collector: ${{ steps.filter.outputs.otel_collector }}
      ssh_gateway: ${{ steps.filter.outputs.ssh_gateway }}
      app_services_any: ${{ steps.filter.outputs.proxy == 'true' || steps.filter.outputs.otel_collector == 'true' || steps.filter.outputs.ssh_gateway == 'true' }}
      app_services_list: ${{ steps.appsvc.outputs.list }}
      any: ${{ steps.filter.outputs.api == 'true' || steps.filter.outputs.runner_chain == 'true' || steps.filter.outputs.sdk_py == 'true' || steps.filter.outputs.tests_or_workflow == 'true' || steps.filter.outputs.proxy == 'true' || steps.filter.outputs.otel_collector == 'true' || steps.filter.outputs.ssh_gateway == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            # API container — apps/api Dockerfile.source bakes from these.
            api:
              - 'apps/api/**'
              - 'apps/dashboard/**'
              - 'apps/libs/**'
            # Runner binary build chain. libboxlite.a (Rust src/**) is
            # statically linked into the runner via CGo, so any Rust src
            # change OR any Go runner-side change invalidates the runner
            # binary. Touching scripts/build/** also invalidates the
            # libboxlite build chain output.
            runner_chain:
              - 'apps/runner/**'
              - 'apps/daemon/**'
              - 'apps/common-go/**'
              - 'apps/api-client-go/**'
              - 'apps/libs/computer-use/**'
              - 'sdks/go/**'
              - 'src/boxlite/**'
              - 'src/api-client/**'
              - 'src/shared/**'
              - 'src/deps/**'
              - 'scripts/build/**'
              - 'sdks/c/src/exec/**'
            # Python SDK. PyO3 wheel pulls libboxlite.a sources too via
            # boxlite-c crate, so Rust src changes also invalidate the
            # SDK. (No separate "sdk needs libboxlite rebuild" output —
            # build_c_sdk gates on either runner_chain or sdk_py.)
            sdk_py:
              - 'sdks/python/**'
            # Test code + workflow self-modifications. Doesn't trigger
            # any rebuild — just runs the existing deployed stack.
            tests_or_workflow:
              - 'scripts/test/e2e/**'
              - '.github/workflows/e2e-cloud.yml'
              - '.github/workflows/build-runner-binary.yml'
              - '.github/workflows/build-c.yml'
            # Supporting ECS services (Proxy / OtelCollector / SshGateway).
            # Each per-service deploy fires only when its own paths
            # change, see deploy-app-services.yml.
            proxy:
              - 'apps/proxy/**'
            otel_collector:
              - 'apps/otel-collector/**'
            ssh_gateway:
              - 'apps/ssh-gateway/**'
      # Build a comma-separated list of changed app-services to pass
      # into deploy-app-services.yml's `services` workflow_call input.
      # Empty when no app-service changed.
      - id: appsvc
        run: |
          set -euo pipefail
          LIST=()
          [ '${{ steps.filter.outputs.proxy }}' = 'true' ]          && LIST+=(Proxy)
          [ '${{ steps.filter.outputs.otel_collector }}' = 'true' ] && LIST+=(OtelCollector)
          [ '${{ steps.filter.outputs.ssh_gateway }}' = 'true' ]    && LIST+=(SshGateway)
          IFS=','
          echo "list=${LIST[*]:-}" >> "$GITHUB_OUTPUT"
          echo "Changed app-services: ${LIST[*]:-(none)}"

  # Build + deploy runner binary as a single reusable workflow.
  # Internally chains build-c.yml → build-runner-binary.yml → S3 push +
  # EC2 self-update poll. See .github/workflows/deploy-runner.yml.
  #
  # Fires only when runner_chain changed. Pure API/SDK/test PRs skip
  # the ~11 min build chain + the EC2 self-update step entirely.
  deploy_runner:
    name: Deploy runner binary (build + push to Tokyo)
    needs: changes
    if: |
      needs.changes.outputs.runner_chain == 'true'
      || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-runner.yml
    permissions:
      id-token: write
      contents: write

  # Build + deploy Api container as a reusable workflow. Internal logic
  # in deploy-api.yml handles: ECR build/push, register-TD (with S3 env
  # patch + Api role reuse via the cloned TD), UpdateService, wait stable,
  # PRIMARY assertion, ALB-healthy poll. Fires only when api source
  # changed — pure runner / test PRs skip the Docker build + ECS deploy.
  deploy_api:
    name: Deploy Api (build + ECS rolling update)
    needs: changes
    if: |
      needs.changes.outputs.api == 'true'
      || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-api.yml
    permissions:
      id-token: write
      contents: read

  # Build + deploy supporting ECS services (Proxy / OtelCollector /
  # SshGateway) as a reusable workflow. Inner workflow has per-service
  # gating; we pass the comma-separated list of services whose source
  # actually changed. Empty list / workflow_dispatch → inner workflow
  # decides ("all 3" for workflow_dispatch without subset).
  deploy_app_services:
    name: Deploy supporting ECS services
    needs: changes
    if: |
      needs.changes.outputs.app_services_any == 'true'
      || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/deploy-app-services.yml
    with:
      services: ${{ needs.changes.outputs.app_services_list }}
    permissions:
      id-token: write
      contents: read

  e2e:
    name: E2E suite (Tokyo)
    needs: [changes, deploy_runner, deploy_api, deploy_app_services]
    # Default GHA semantics: a job whose `needs:` is SKIPPED also gets
    # skipped. Override via !failure() && !cancelled() — runs as long
    # as nothing in the upstream chain actively failed (skipped is OK,
    # which is exactly what happens on pure API / test PRs).
    if: |
      !failure() && !cancelled()
      && (needs.changes.outputs.any == 'true' || github.event_name == 'workflow_dispatch')
    # Test suite lives in its own workflow so it can be dispatched
    # standalone (re-run pytest against the currently-deployed Tokyo
    # stack without rebuilding/redeploying). Same `e2e-cloud-shared`
    # concurrency group, so a standalone test dispatch and an
    # in-flight deploy queue against each other.
    uses: ./.github/workflows/e2e-cloud-test.yml
    permissions:
      id-token: write
      contents: read

  # NOTE: an `e2e-gate` consolidation job has been INTENTIONALLY OMITTED
  # for now. The gate's purpose is to give branch protection a stable
  # always-reported status check — but adding it back as a required check
  # before the Tokyo stack's AWS prerequisites are provisioned would block
  # every PR (the e2e job has no path to succeed until then). Re-introduce
  # the gate (and add it to branch protection) once a first green run
  # against Tokyo is observed.
